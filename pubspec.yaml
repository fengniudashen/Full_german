name: deutschflow
description: A cross-platform German dictation learning app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  just_audio: ^0.9.39
  just_audio_windows: ^0.2.2
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  flutter_audio_waveforms: ^1.2.1
  http: ^1.2.2
  intl: ^0.19.0
  flutter_markdown: ^0.7.4+3
  record: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/deu_eng_dict.tsv
